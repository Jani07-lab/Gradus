<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradus - Portal do Aluno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/css/login.css">
</head>
<body class="vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row mx-auto overflow-hidden login-card"> 
            
            <div class="col-lg-6 d-none d-lg-flex flex-column justify-content-center align-items-center branding-side">
                
                <div class="logo-container">
                    <img src="/src/imagens/logocolorida-removebg-preview.png" alt="Logo Gradus" class="gradus-logo">
                </div>
                
                <p class="subtitle-text text-center">Sua evolução acadêmica, passo a passo.</p>
            </div>

            <div class="col-lg-6 form-side p-5 d-flex align-items-center">
                <div class="w-100 px-lg-4">
                    <div class="mb-5">
                        <h2 class="fw-bold title-text">Olá, Estudante!</h2>
                        <p class="text-muted-custom">Acesse o portal para continuar seus estudos.</p>
                    </div>
                    
                    <form>
                        <div class="mb-4">
                            <label class="form-label custom-label">E-mail Acadêmico</label>
                            <input type="email" class="form-control custom-input" placeholder="seu@email.com">
                        </div>
                        <div class="mb-4">
                            <label class="form-label custom-label">Sua Senha</label>
                            <input type="password" class="form-control custom-input" placeholder="••••••••">
                        </div>
                        <div class="mb-4 mt-2 text-start">
                        <a href="#" class="forgot-link">Esqueceu sua senha?</a>
                    </div>
                        <button type="submit" class="btn btn-gradus w-100 py-3 mt-3">Entrar na plataforma</button>
                    </form>
                     <div class="mt-4 text-center">
                        <span class="text-muted-custom">Não tem uma conta?</span>
                        <a href="telaCadastro.html" class="forgot-link ms-1">Crie sua conta aqui</a>
                </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
